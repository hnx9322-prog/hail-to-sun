const currentPositions = new Float32Array(targetPositions.length);
for(let i = 0; i < currentPositions.length; i++) {
    currentPositions[i] = (Math.random() - 0.5) * 20; // 初始散落位置
}

const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));

const material = new THREE.PointsMaterial({
    color: 0xdc9fb4, // 茱萸粉
    size: 0.02,
    transparent: true,
    opacity: 0.8,
    blending: THREE.AdditiveBlending 
});

const heart = new THREE.Points(geometry, material);
group.add(heart); // 添加到组

// ==========================
// B. 构建文字粒子系统
// ==========================
let textPoints = null; // 用于在动画循环中获取文字粒子

const loader = new THREE.FontLoader();
// 加载 Optimer 字体（一款带点优雅衬线感的字体）
loader.load('https://unpkg.com/three@0.128.0/examples/fonts/optimer_regular.typeface.json', function (font) {
    const textGeo = new THREE.TextGeometry('Hail to Sun', {
        font: font,
        size: 0.25,
        height: 0.02,
        curveSegments: 12,
        bevelEnabled: true,
        bevelThickness: 0.02,
        bevelSize: 0.01,
        bevelSegments: 4
    });

    // 将文字居中，并稍微往前移一点点，避免完全被中心密集的爱心粒子遮挡
    textGeo.center();
    textGeo.translate(0, 0, 0.15);

    // 提取文字几何体的顶点，将其转化为粒子
    const textParticles = new THREE.BufferGeometry();
    textParticles.setAttribute('position', textGeo.getAttribute('position'));

    const textMat = new THREE.PointsMaterial({
        color: 0xe88ca8, // 蔷薇粉
        size: 0.012, // 文字粒子可以稍微小一点，显得更精细
        transparent: true,
        opacity: 0,  // 初始透明度为0，等待爱心汇聚后浮现
        blending: THREE.AdditiveBlending
    });

    textPoints = new THREE.Points(textParticles, textMat);
    group.add(textPoints); // 文字也添加到同一个组
});

// ==========================
// C. 动画渲染逻辑
// ==========================
let t = 0;
let isAssembled = false;

function animate() {
    requestAnimationFrame(animate);

    const positions = heart.geometry.attributes.position.array;
    let assembling = false;

    // 1. 爱心交织汇聚动画
    for(let i = 0; i < positions.length; i++) {
        const target = targetPositions[i];
        const current = positions[i];
        const diff = target - current;

        if (Math.abs(diff) > 0.005) {
            positions[i] += diff * 0.025; 
            assembling = true;
        }
    }
    heart.geometry.attributes.position.needsUpdate = true;

    // 2. 当粒子基本汇聚完毕时，让文字粒子逐渐浮现
    if (!assembling && !isAssembled) {
        isAssembled = true;
    }

    if (isAssembled && textPoints) {
        if (textPoints.material.opacity < 0.9) {
            textPoints.material.opacity += 0.01; // 淡入效果
        }
    }

    // 3. 整体呼吸跳动与旋转 (作用于 group)
    t += 0.03;
    const pulse = 1 + Math.pow(Math.sin(t), 8) * 0.15;

    group.scale.set(pulse, pulse, pulse); // 爱心和文字共同呼吸
    group.rotation.y += 0.005;            // 共同自转
    group.rotation.x = Math.sin(t * 0.5) * 0.05; // 共同摇摆

    renderer.render(scene, camera);
}

animate();

// 响应式窗口
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
